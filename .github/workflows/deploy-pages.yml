name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      # TanStack Start's Cloudflare-target build emits static client assets to
      # .output/public. That folder is what GitHub Pages serves.
      - name: Prepare static output
        run: |
          mkdir -p dist
          if [ -d ".output/public" ]; then
            cp -r .output/public/* dist/
          elif [ -d "dist" ]; then
            echo "Using existing dist/"
          else
            echo "::error::No build output found"; exit 1
          fi
          # SPA fallback so deep links work on GitHub Pages
          if [ -f "dist/index.html" ]; then
            cp dist/index.html dist/404.html
          fi
          touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
